<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Schadenerfassung</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

.form{
background:white;
padding:30px;
border-radius:10px;
max-width:500px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:12px;
background:#0077cc;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

#loader{
display:none;
margin-top:10px;
font-weight:bold;
}

</style>

</head>
<body>

<h1>Schadenerfassung</h1>

<div class="form">

<label>Vertragsnummer</label>
<input id="vertrag">

<label>Retourdatum</label>
<input type="date" id="retour">

<label>Artikel</label>
<input id="artikel">

<label>Vermieter</label>
<input id="vermieter">

<label>Dokumentiert von</label>
<input id="mitarbeiter">

<label>Art des Schadens</label>
<textarea id="schaden"></textarea>

<label>Kosten des Schadens</label>
<input id="kosten">

<button id="pdfbutton" onclick="create()">PDF erstellen</button>

<div id="loader">
PDF wird erstellt... bitte warten
</div>

</div>

<script>

async function create(){

const button = document.getElementById("pdfbutton")
const loader = document.getElementById("loader")

button.disabled = true
loader.style.display = "block"

const form = new FormData()

form.append("vertrag",document.getElementById("vertrag").value)
form.append("retour",document.getElementById("retour").value)
form.append("artikel",document.getElementById("artikel").value)
form.append("vermieter",document.getElementById("vermieter").value)
form.append("mitarbeiter",document.getElementById("mitarbeiter").value)
form.append("schaden",document.getElementById("schaden").value)
form.append("kosten",document.getElementById("kosten").value)

try{

const res = await fetch("/create",{
method:"POST",
body:form
})

if(!res.ok){
throw new Error("Server Fehler")
}

const blob = await res.blob()

const url = window.URL.createObjectURL(blob)

const a = document.createElement("a")
a.href = url
a.download = "Schadenerfassung_"+document.getElementById("vertrag").value+".pdf"

document.body.appendChild(a)
a.click()

window.URL.revokeObjectURL(url)

}catch(err){

alert("Fehler beim PDF erstellen")

}

button.disabled = false
loader.style.display = "none"

}

</script>

</body>
</html>
