
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Schadenerfassung</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Schadenerfassung</h1>

<div class="form">

<label>Vertragsnummer</label>
<input id="vertrag">

<label>Retourdatum</label>
<input type="date" id="retour">

<label>Artikel</label>
<input id="artikel">

<label>Vermieter</label>
<input id="vermieter">

<label>Erhalten am</label>
<input type="date" id="erhalten">

<label>Dokumentiert von</label>
<input id="mitarbeiter">

<label>Art des Schadens</label>
<textarea id="schaden"></textarea>

<label>Kosten des Schadens</label>
<input id="kosten">

<label>Bilder</label>
<input type="file" id="bilder" multiple accept="image/*" capture="environment">

<button onclick="create()">PDF erstellen</button>

</div>

<script>

async function create(){

const form=new FormData()

form.append("vertrag",vertrag.value)
form.append("retour",retour.value)
form.append("artikel",artikel.value)
form.append("vermieter",vermieter.value)
form.append("erhalten",erhalten.value)
form.append("mitarbeiter",mitarbeiter.value)
form.append("schaden",schaden.value)
form.append("kosten",kosten.value)

for(const f of bilder.files){
form.append("bilder",f)
}

const res=await fetch("/create",{method:"POST",body:form})
const blob=await res.blob()

const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="Schadenerfassung_"+vertrag.value+".pdf"
a.click()

}

</script>

</body>
</html>
